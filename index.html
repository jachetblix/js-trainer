const STORAGE_KEY = 'js-trainer-progress-v2';

function allTaskIds() {
  return new Set(MODULES.flatMap(m => m.tasks.map(t => t.id)));
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return new Set();
    const data = JSON.parse(raw);
    const valid = allTaskIds();
    const passed = Array.isArray(data.passed) ? data.passed : [];
    return new Set(passed.filter(id => valid.has(id)));
  } catch {
    return new Set();
  }
}

function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    version: 2,
    updatedAt: new Date().toISOString(),
    passed: [...state.passed]
  }));
}

function exportProgress() {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    passed: [...state.passed]
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'js-trainer-progress.json';
  a.click();
  URL.revokeObjectURL(url);
}

async function importProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const data = JSON.parse(await file.text());
    const valid = allTaskIds();
    const passed = (Array.isArray(data) ? data : data.passed || []).filter(id => valid.has(id));
    state.passed = new Set(passed);
    saveProgress();
    renderNav();
    renderModule();
  } catch {
    alert('Не смог импортировать прогресс: файл должен быть JSON с массивом passed.');
  } finally {
    event.target.value = '';
  }
}

function resetProgress() {
  if (!confirm('Сбросить весь прогресс?')) return;
  state.passed.clear();
  saveProgress();
  renderNav();
  renderModule();
}

const state = { passed: loadProgress(), current: 0 };
const TOTAL = MODULES.reduce((a, m) => a + m.tasks.length, 0);

function deepEq(a, b) {
  if (a === b) return true;
  if (typeof a !== typeof b) return false;
  if (a === null || b === null) return false;
  if (Array.isArray(a)) {
    if (!Array.isArray(b) || a.length !== b.length) return false;
    return a.every((v, i) => deepEq(v, b[i]));
  }
  if (typeof a === 'object') {
    const ka = Object.keys(a), kb = Object.keys(b);
    if (ka.length !== kb.length) return false;
    return ka.every(k => deepEq(a[k], b[k]));
  }
  return false;
}
function cloneArgs(args) {
  try { return structuredClone(args); } catch { return args; }
}
function fmt(v) {
  if (v === undefined) return 'undefined';
  try { return JSON.stringify(v); } catch { return String(v); }
}

async function runTask(mod, task) {
  const editor = document.getElementById('ed-' + task.id);
  const out = document.getElementById('out-' + task.id);
  const dot = document.getElementById('dot-' + task.id);
  out.classList.add('show');
  out.innerHTML = '<span class="t-log">$ running tests…</span>';

  const logs = [];
  const fakeConsole = { log: (...a) => logs.push(a.map(fmt).join(' ')), error: (...a) => logs.push(a.map(fmt).join(' ')), warn: (...a) => logs.push(a.map(fmt).join(' ')) };

  let target;
  try {
    const factory = new Function('console', editor.value + '\n;return typeof ' + task.fname + " !== 'undefined' ? " + task.fname + ' : undefined;');
    target = factory(fakeConsole);
  } catch (e) {
    out.innerHTML = '<span class="t-err">✗ синтаксическая ошибка:\n  ' + esc(e.message) + '</span>';
    dot.className = 'task-status fail';
    return;
  }
  if (target === undefined) {
    out.innerHTML = '<span class="t-err">✗ не найдена функция/класс с именем ' + task.fname + '</span>';
    dot.className = 'task-status fail';
    return;
  }

  const lines = [];
  let allPass = true;

  const timeout = (p, ms) => Promise.race([p, new Promise((_, rej) => setTimeout(() => rej(new Error('таймаут ' + ms + 'мс — возможно, бесконечный цикл или промис никогда не резолвится')), ms))]);

  for (const t of task.tests) {
    try {
      if (t.custom) {
        const res = await timeout(CUSTOM_TESTS[t.custom](target), 3000);
        if (res.ok) lines.push('<span class="t-pass">✓ ' + esc(res.msg) + '</span>');
        else { lines.push('<span class="t-fail">✗ ' + esc(res.msg) + '</span>'); allPass = false; }
      } else {
        let got = target(...cloneArgs(t.args));
        if (got instanceof Promise) got = await timeout(got, 3000);
        const argStr = t.args.map(fmt).join(', ');
        if (deepEq(got, t.exp)) {
          lines.push('<span class="t-pass">✓ ' + esc(task.fname + '(' + argStr + ') → ' + fmt(got)) + '</span>');
        } else {
          lines.push('<span class="t-fail">✗ ' + esc(task.fname + '(' + argStr + ')') + '\n  <span class="t-log">ожидалось:</span> ' + esc(fmt(t.exp)) + '\n  <span class="t-log">получено: </span> ' + esc(fmt(got)) + '</span>');
          allPass = false;
        }
      }
    } catch (e) {
      lines.push('<span class="t-fail">✗ исключение: ' + esc(e.message) + '</span>');
      allPass = false;
    }
  }

  if (logs.length) lines.push('<span class="t-log">— console —\n' + esc(logs.join('\n')) + '</span>');
  lines.push(allPass
    ? '<span class="t-pass">\n▸ PASSED — задача засчитана</span>'
    : '<span class="t-sum">\n▸ FAILED — поправь и запусти снова</span>');
  out.innerHTML = lines.join('\n');
  dot.className = 'task-status ' + (allPass ? 'pass' : 'fail');

  if (allPass) {
    state.passed.add(task.id);
    saveProgress();
  }
  refreshProgress();
}

function refreshProgress() {
  const n = state.passed.size;
  document.getElementById('prog-text').textContent = n + '/' + TOTAL;
  document.getElementById('prog-fill').style.width = (n / TOTAL * 100) + '%';
  MODULES.forEach((m, i) => {
    const done = m.tasks.filter(t => state.passed.has(t.id)).length;
    const el = document.getElementById('navchk-' + i);
    if (done === m.tasks.length) { el.textContent = '✓'; el.className = 'nav-check done'; }
    else if (done > 0) { el.textContent = done + '/' + m.tasks.length; el.className = 'nav-check part'; }
    else { el.textContent = '·'; el.className = 'nav-check'; }
  });
  const fin = document.getElementById('finish');
  if (fin) fin.classList.toggle('show', n === TOTAL);
}

/* ---------- рендер ---------- */
const editorsCache = {}; // сохраняем код при переключении модулей

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = MODULES.map((m, i) =>
    `<div class="nav-item ${i === state.current ? 'active' : ''}" onclick="goTo(${i})">
      <span class="nav-num">${String(i+1).padStart(2,'0')}</span>
      <span>${m.title}</span>
      <span class="nav-check" id="navchk-${i}">·</span>
    </div>`).join('');
}

function renderModule() {
  const m = MODULES[state.current];
  const main = document.getElementById('main');
  const links = m.links.map(([t, u]) => `<a class="ext-link" href="${u}" target="_blank" rel="noopener">${t} ↗</a>`).join(' · ');

  main.innerHTML = `
    <div class="module-eyebrow">$ module <b>${String(state.current+1).padStart(2,'0')}/${MODULES.length}</b></div>
    <h1>${m.title}</h1>
    <p class="module-desc">${m.desc}</p>
    <div style="font-family:var(--mono);font-size:12px;color:var(--overlay)">javascript.info: ${links}</div>
    <div class="theory">${m.theory}</div>
    ${m.tasks.map(t => `
    <div class="task">
      <div class="task-head">
        <div class="task-status ${state.passed.has(t.id) ? 'pass' : ''}" id="dot-${t.id}"></div>
        <div class="task-title">${t.title}</div>
        <div class="task-tag">${t.tag}</div>
      </div>
      <div class="task-body">
        <div class="task-desc">${t.desc}</div>
        <textarea class="editor" id="ed-${t.id}" spellcheck="false">${esc(editorsCache[t.id] ?? t.starter)}</textarea>
        <div class="task-actions">
          <button class="btn-run" onclick="runTaskById('${t.id}')">▸ Запустить тесты</button>
          <button class="btn-ghost" onclick="toggle('hint-${t.id}')">Подсказка</button>
          <button class="btn-ghost" onclick="toggle('sol-${t.id}')">Решение</button>
        </div>
        <div class="hintbox" id="hint-${t.id}">💡 ${t.hint}</div>
        <div class="solbox" id="sol-${t.id}"><pre><code>${esc(t.solution)}</code></pre></div>
        <div class="output" id="out-${t.id}"></div>
      </div>
    </div>`).join('')}
    <div class="module-nav">
      <button class="btn-ghost" onclick="goTo(${state.current-1})" ${state.current === 0 ? 'disabled style="opacity:.3"' : ''}>← ${state.current > 0 ? MODULES[state.current-1].title : ''}</button>
      <button class="btn-ghost" onclick="goTo(${state.current+1})" ${state.current === MODULES.length-1 ? 'disabled style="opacity:.3"' : ''}>${state.current < MODULES.length-1 ? MODULES[state.current+1].title : ''} →</button>
    </div>
    ${state.current === MODULES.length - 1 ? '<div class="finish" id="finish"><h2>▸ ' + TOTAL + '/' + TOTAL + ' — pipeline green</h2><p>Все задачи решены. Дальше: перепиши random-name-picker-bot с Go на Node.js — язык новый, а AWS и CI/CD уже твои.</p></div>' : ''}
  `;

  // сохранять код при вводе + tab в редакторах
  m.tasks.forEach(t => {
    const ed = document.getElementById('ed-' + t.id);
    ed.addEventListener('input', () => { editorsCache[t.id] = ed.value; });
    ed.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = ed.selectionStart;
        ed.value = ed.value.slice(0, s) + '  ' + ed.value.slice(ed.selectionEnd);
        ed.selectionStart = ed.selectionEnd = s + 2;
        editorsCache[t.id] = ed.value;
      }
    });
  });
  refreshProgress();
}

function runTaskById(id) {
  for (const m of MODULES) {
    const t = m.tasks.find(t => t.id === id);
    if (t) { runTask(m, t); return; }
  }
}
function toggle(id) { document.getElementById(id).classList.toggle('show'); }
function goTo(i) {
  if (i < 0 || i >= MODULES.length) return;
  state.current = i;
  renderNav(); renderModule();
  window.scrollTo({top: 0});
}

renderNav();
renderModule();
</script>
</body>
